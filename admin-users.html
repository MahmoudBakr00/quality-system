<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>إدارة المستخدمين - الأدمن</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { background: #0f172a; padding: 20px; color: #f1f5f9; }
.container { max-width: 1200px; margin: 0 auto; }
.header { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 16px 30px; border-radius: 14px; margin-bottom: 20px; flex-wrap: wrap; }
.header h1 { color: #60a5fa; }
.nav-links a { color: #93c5fd; text-decoration: none; background: #334155; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; margin-left: 8px; }
.nav-links a:hover { background: #475569; }
.logout-btn { background: #ef4444; color: white; border: none; padding: 8px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
.logout-btn:hover { background: #dc2626; }

.panel { background: #1e293b; border-radius: 14px; padding: 24px; margin-bottom: 20px; }
.panel h2 { color: #60a5fa; margin-bottom: 16px; }
.panel .hint { color: #64748b; font-size: 13px; margin-bottom: 12px; }

.user-card { background: #334155; border-radius: 10px; padding: 14px 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
.user-card .info { display: flex; flex-direction: column; }
.user-card .info .name { font-weight: bold; color: #f1f5f9; }
.user-card .info .email { font-size: 12px; color: #94a3b8; }

.btn-edit { background: #3b82f6; color: white; border: none; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
.btn-edit:hover { background: #2563eb; }

.user-form { background: #0f172a; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
.user-form .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.user-form .field { display: flex; flex-direction: column; }
.user-form .field label { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
.user-form .field input, .user-form .field select { padding: 10px; border: none; border-radius: 6px; background: #334155; color: #f1f5f9; }
.user-form .field select[multiple] { height: 100px; }
.user-form .actions { grid-column: 1/-1; display: flex; gap: 10px; margin-top: 10px; }
.btn-primary { background: #3b82f6; color: white; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; }
.btn-primary:hover { background: #2563eb; }
.btn-reset { background: #64748b; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
.btn-reset:hover { background: #475569; }

.temp-password { background: #1e293b; padding: 10px; border-radius: 8px; margin-top: 10px; display: none; }
.temp-password .pass { color: #fbbf24; font-size: 18px; font-weight: bold; direction: ltr; }

.filter-bar { background: #0f172a; padding: 12px; border-radius: 10px; margin-bottom: 10px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.filter-bar input { flex: 1; padding: 10px; border: none; border-radius: 6px; background: #334155; color: #f1f5f9; min-width: 200px; }
.filter-bar select { padding: 10px; border: none; border-radius: 6px; background: #334155; color: #f1f5f9; }
.filter-bar button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>👥 إدارة المستخدمين</h1>
<div class="nav-links">
<a href="admin.html">📊 لوحة التحكم</a>
<a href="models-manager.html">🧩 إدارة الموديلات</a>
<a href="submissions.html">📄 سجلات الفورمات</a>
<a href="defects-admin.html">🔧 إدارة العيوب</a>
<button class="logout-btn" id="logoutBtn">تسجيل خروج</button>
</div>
</div>

<div class="panel">
<h2>➕ إضافة مستخدم جديد</h2>
<div class="user-form">
  <div class="row">
    <div class="field">
      <label>📧 البريد الإلكتروني</label>
      <input type="email" id="newUserEmail" placeholder="example@company.com" />
    </div>
    <div class="field">
      <label>👤 الدور</label>
      <select id="newUserRole">
        <option value="technician">فني</option>
        <option value="admin">أدمن</option>
      </select>
    </div>
    <div class="field" id="stageAssignment" style="display:none;">
      <label>🏭 المراحل المسموح بها (للأدمن الفرعي)</label>
      <select id="newUserStages" multiple>
      </select>
    </div>
    <div class="actions">
      <button class="btn-primary" id="createUserBtn">➕ إنشاء حساب وإرسال البيانات</button>
    </div>
    <div class="temp-password" id="tempPasswordDisplay">
      <label>🔑 كلمة المرور المؤقتة للموظف:</label>
      <div class="pass" id="tempPasswordText">********</div>
      <small style="color:#94a3b8;">تم إرسالها إلى بريد الموظف. سيقوم بتغييرها عند أول تسجيل دخول.</small>
    </div>
  </div>
</div>
</div>

<div class="panel">
<h2>🔍 بحث في المستخدمين</h2>
<div class="filter-bar">
  <input type="text" id="searchUserInput" placeholder="🔍 ابحث بالبريد الإلكتروني...">
  <select id="searchUserRole">
    <option value="">كل الأدوار</option>
    <option value="admin">أدمن</option>
    <option value="technician">فني</option>
  </select>
  <button class="btn-primary" id="searchUserBtn">🔍 بحث</button>
  <button class="btn-reset" id="resetUserSearch">↺ إعادة تعيين</button>
</div>
<div id="searchResults"></div>
</div>

<div class="panel">
<h2>📋 المستخدمين المسجلين</h2>
<div id="usersList"><div class="hint">⏳ جاري التحميل...</div></div>
</div>
</div>

<script>
const SUPABASE_URL = "https://bqjlqqaabiumcexqchqc.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_D6-VvfjFbWgngyTwkkqrfA_pfoDS-1W";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// عميل منفصل بيُستخدم فقط لإنشاء حسابات جديدة (auth.signUp)
// ده ضروري عشان استدعاء signUp() بيبدّل جلسة الدخول الحالية تلقائيًا
// لو استخدمنا نفس الـ client بتاع الأدمن، هيتم تسجيل خروج الأدمن ضمنيًا
// ويتم تسجيل دخوله كأنه المستخدم الجديد، وهيفشل إنشاء الـ profile بصمت.
// باستخدام عميل مستقل بجلسة غير محفوظة، تفضل جلسة الأدمن سليمة طول الوقت.
const creationClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    persistSession: false,
    storageKey: 'temp-user-creation-session',
    autoRefreshToken: false
  }
});

let currentUser = null;
let allUsers = [];
let allStages = [];

async function checkAuth() {
  const { data: { user } } = await client.auth.getUser();
  if (!user) { window.location.href = 'index.html'; return; }
  currentUser = user;
  const { data: profile } = await client.from('profiles').select('role').eq('id', user.id).single();
  if (!profile || profile.role !== 'admin') { window.location.href = 'index.html'; return; }
  
  await loadStages();
  loadUsers();
}
checkAuth();

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await client.auth.signOut();
  window.location.href = 'index.html';
});

document.getElementById('newUserRole').addEventListener('change', (e) => {
  document.getElementById('stageAssignment').style.display = e.target.value === 'admin' ? 'block' : 'none';
});

async function loadStages() {
  const { data, error } = await client.from('stages').select('*').order('name');
  if (!error && data) {
    allStages = data;
    const select = document.getElementById('newUserStages');
    select.innerHTML = '';
    data.forEach(s => {
      const o = document.createElement('option');
      o.value = s.id;
      o.textContent = s.name;
      select.appendChild(o);
    });
  }
}

async function loadUsers() {
  const { data, error } = await client.from('profiles').select('id, email, role').order('created_at');
  if (error) {
    document.getElementById('usersList').innerHTML = `<div class="hint">❌ فشل التحميل</div>`;
    return;
  }
  allUsers = data || [];
  renderUsers();
}

function renderUsers() {
  const container = document.getElementById('usersList');
  if (allUsers.length === 0) {
    container.innerHTML = `<div class="hint">📭 لا يوجد مستخدمين مسجلين</div>`;
    return;
  }
  
  let html = '';
  allUsers.forEach(user => {
    const isCurrent = user.id === currentUser.id;
    const roleName = user.role === 'admin' ? 'أدمن' : 'فني';
    html += `
      <div class="user-card">
        <div class="info">
          <div class="name">${user.email || 'بدون بريد'} ${isCurrent ? '⭐ (أنت)' : ''}</div>
          <div class="email">${roleName}</div>
        </div>
      </div>
    `;
  });
  container.innerHTML = html;
}

// ============ إنشاء حساب جديد ============
document.getElementById('createUserBtn').addEventListener('click', async () => {
  const email = document.getElementById('newUserEmail').value.trim();
  const role = document.getElementById('newUserRole').value;
  const selectedStages = Array.from(document.getElementById('newUserStages').selectedOptions).map(o => o.value);
  
  if (!email) {
    alert('⚠️ يرجى إدخال البريد الإلكتروني');
    return;
  }
  
  const tempPassword = generateTempPassword();
  
  try {
    const { data, error } = await creationClient.auth.signUp({
      email,
      password: tempPassword,
      options: {
        data: { role }
      }
    });
    
    if (error) throw error;
    
    // انتظر شوية عشان الـ profile يتعمل
    await new Promise(resolve => setTimeout(resolve, 2000));
    
    // نعمل الـ profile يدوياً (لو ما اتعملش)
    // ملحوظة: هنا لازم نستخدم "client" (جلسة الأدمن) مش "creationClient"،
    // عشان الأدمن هو اللي يملك صلاحية الكتابة في profiles حسب الـ RLS
    const { error: profileError } = await client
      .from('profiles')
      .upsert({ 
        id: data.user.id, 
        email: email, 
        role: role 
      });
    
    if (profileError) {
      console.warn('Profile upsert warning:', profileError);
      alert('⚠️ تم إنشاء حساب الدخول، لكن فشل إنشاء الـ profile: ' + profileError.message + '\nراجع صلاحيات RLS على جدول profiles.');
    }
    
    if (role === 'admin' && selectedStages.length > 0) {
      const rows = selectedStages.map(stageId => ({
        admin_id: data.user.id,
        stage_id: stageId
      }));
      const { error: stageError } = await client.from('admin_stages').insert(rows);
      if (stageError) {
        console.warn('Stage assignment warning:', stageError);
      }
    }
    
    document.getElementById('tempPasswordText').textContent = tempPassword;
    document.getElementById('tempPasswordDisplay').style.display = 'block';
    
    alert(`✅ تم إنشاء الحساب بنجاح!\n\n📧 البريد: ${email}\n🔑 كلمة المرور المؤقتة: ${tempPassword}\n\n⚠️ يرجى إعطاء الموظف كلمة المرور وسيقوم بتغييرها عند أول تسجيل دخول.`);
    
    loadUsers();
    document.getElementById('newUserEmail').value = '';
    document.getElementById('newUserStages').selectedIndex = -1;
    
  } catch (err) {
    alert('❌ فشل إنشاء الحساب: ' + err.message);
  }
});

function generateTempPassword() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
  let password = '';
  for (let i = 0; i < 12; i++) {
    password += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return password;
}

// ============ البحث في المستخدمين ============
document.getElementById('searchUserBtn').addEventListener('click', () => {
  const searchTerm = document.getElementById('searchUserInput').value.trim().toLowerCase();
  const role = document.getElementById('searchUserRole').value;
  
  let filtered = allUsers;
  if (searchTerm) {
    filtered = filtered.filter(u => u.email && u.email.toLowerCase().includes(searchTerm));
  }
  if (role) {
    filtered = filtered.filter(u => u.role === role);
  }
  
  const container = document.getElementById('searchResults');
  if (filtered.length === 0) {
    container.innerHTML = `<div class="hint">📭 لا توجد نتائج</div>`;
    return;
  }
  
  let html = '';
  filtered.forEach(user => {
    const roleName = user.role === 'admin' ? 'أدمن' : 'فني';
    html += `
      <div class="user-card">
        <div class="info">
          <div class="name">${user.email || 'بدون بريد'}</div>
          <div class="email">${roleName}</div>
        </div>
      </div>
    `;
  });
  container.innerHTML = html;
});

document.getElementById('resetUserSearch').addEventListener('click', () => {
  document.getElementById('searchUserInput').value = '';
  document.getElementById('searchUserRole').value = '';
  document.getElementById('searchResults').innerHTML = '';
});

// إضافة Enter key للبحث
document.getElementById('searchUserInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    document.getElementById('searchUserBtn').click();
  }
});
</script>
</body>
</html>
