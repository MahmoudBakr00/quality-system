<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>إدارة العيوب - الأدمن</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { background: #0f172a; padding: 20px; color: #f1f5f9; }
.container { max-width: 1300px; margin: 0 auto; }
.header { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 16px 30px; border-radius: 14px; margin-bottom: 20px; flex-wrap: wrap; }
.header h1 { color: #60a5fa; }
.nav-links a { color: #93c5fd; text-decoration: none; background: #334155; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; margin-left: 8px; }
.nav-links a:hover { background: #475569; }
.logout-btn { background: #ef4444; color: white; border: none; padding: 8px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
.logout-btn:hover { background: #dc2626; }

.filter-bar { display: flex; gap: 10px; flex-wrap: wrap; background: #1e293b; padding: 14px 20px; border-radius: 12px; margin-bottom: 20px; align-items: center; }
.filter-bar select, .filter-bar input { padding: 8px 14px; border: none; border-radius: 6px; background: #334155; color: #f1f5f9; }
.filter-bar button { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background: #3b82f6; color: white; }
.filter-bar button:hover { background: #2563eb; }

.table-wrapper { overflow-x: auto; background: #1e293b; border-radius: 14px; padding: 10px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 900px; }
th { background: #334155; color: #94a3b8; padding: 10px 8px; text-align: center; border-bottom: 2px solid #475569; }
td { padding: 8px; text-align: center; border-bottom: 1px solid #334155; color: #e2e8f0; }
tr:hover td { background: #2d3a4f; }
.badge-pending { background: #f59e0b; color: white; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
.badge-approved { background: #22c55e; color: white; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
.badge-rejected { background: #ef4444; color: white; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
.btn-action { background: #3b82f6; color: white; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; margin: 2px; }
.btn-action:hover { background: #2563eb; }
.btn-action.approve { background: #22c55e; }
.btn-action.approve:hover { background: #16a34a; }
.btn-action.reject { background: #ef4444; }
.btn-action.reject:hover { background: #dc2626; }
.loading, .no-data { text-align: center; padding: 40px; color: #94a3b8; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; }
.modal-overlay.open { display: flex; }
.modal-box { background: #1e293b; border-radius: 14px; padding: 24px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
.modal-box h3 { color: #60a5fa; margin-bottom: 14px; }
.modal-box .field { margin-bottom: 12px; }
.modal-box .field label { display: block; color: #94a3b8; font-size: 12px; margin-bottom: 4px; }
.modal-box .field input, .modal-box .field select, .modal-box .field textarea { width: 100%; padding: 8px 12px; border: none; border-radius: 6px; background: #334155; color: #f1f5f9; }
.modal-box .field textarea { min-height: 80px; resize: vertical; }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; }
.modal-actions button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
.modal-close { background: #64748b; color: white; }
.modal-close:hover { background: #475569; }
.modal-save { background: #22c55e; color: white; }
.modal-save:hover { background: #16a34a; }
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🔧 إدارة العيوب المسجلة</h1>
<div class="nav-links">
<a href="admin.html">📊 لوحة التحكم</a>
<a href="models-manager.html">🧩 إدارة الموديلات</a>
<a href="submissions.html">📄 سجلات الفورمات</a>
<a href="admin-users.html">👥 إدارة الادمن</a>
<button class="logout-btn" id="logoutBtn">تسجيل خروج</button>
</div>
</div>

<div class="filter-bar">
<select id="filterStage"><option value="">كل المراحل</option></select>
<select id="filterStatus"><option value="">كل الحالات</option><option value="pending">⏳ معلق</option><option value="approved">✅ معتمد</option><option value="rejected">❌ مرفوض</option></select>
<input type="text" id="filterSerial" placeholder="السيريال" />
<button id="applyFilter">🔍 تصفية</button>
<button id="resetFilter" style="background:#64748b;">↺ إعادة تعيين</button>
</div>

<div class="table-wrapper">
<table>
<thead><tr><th>#</th><th>التاريخ</th><th>السيريال</th><th>المرحلة</th><th>نوع العيب</th><th>الوصف</th><th>الفني</th><th>الحالة</th><th>الإجراء</th><th></th></tr></thead>
<tbody id="defectsTbody"><tr><td colspan="10" class="loading">⏳ جاري التحميل...</td></tr></tbody>
</table>
</div>
</div>

<!-- مودال معالجة العيب -->
<div class="modal-overlay" id="actionModal">
<div class="modal-box">
<h3 id="actionTitle">🔧 معالجة العيب</h3>
<div class="field"><label>🏷️ السيريال</label><input type="text" id="actionSerial" disabled /></div>
<div class="field"><label>⚠️ نوع العيب</label><input type="text" id="actionType" disabled /></div>
<div class="field"><label>📝 وصف العيب</label><textarea id="actionDescription" disabled></textarea></div>
<div class="field"><label>📌 الإجراء المتخذ (إلزامي)</label><textarea id="actionTaken" placeholder="مثال: تم إعادة الثني، تم استبدال القطعة..."></textarea></div>
<div class="modal-actions">
<button class="modal-save" id="actionApprove">✅ موافقة</button>
<button class="modal-save" style="background:#ef4444;" id="actionReject">❌ رفض</button>
<button class="modal-close" id="actionCancel">إلغاء</button>
</div>
</div>
</div>

<script>
const SUPABASE_URL = "https://bqjlqqaabiumcexqchqc.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_D6-VvfjFbWgngyTwkkqrfA_pfoDS-1W";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let allDefects = [];
let allStages = [];
let currentDefectId = null;

async function checkAuth() {
  const { data: { user } } = await client.auth.getUser();
  if (!user) { window.location.href = 'index.html'; return; }
  const { data: profile } = await client.from('profiles').select('role').eq('id', user.id).single();
  if (!profile || profile.role !== 'admin') { window.location.href = 'index.html'; return; }
  await loadLookups();
  loadDefects();
}
checkAuth();

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await client.auth.signOut();
  window.location.href = 'index.html';
});

async function loadLookups() {
  const { data: stages } = await client.from('stages').select('*').order('name');
  allStages = stages || [];
  const stageSel = document.getElementById('filterStage');
  stageSel.innerHTML = '<option value="">كل المراحل</option>';
  allStages.forEach(s => {
    const o = document.createElement('option'); o.value = s.id; o.textContent = s.name;
    stageSel.appendChild(o);
  });
}

function getStageName(id) {
  const s = allStages.find(st => st.id === id);
  return s ? s.name : '-';
}

function statusBadge(status) {
  if (status === 'approved') return `<span class="badge-approved">✅ معتمد</span>`;
  if (status === 'rejected') return `<span class="badge-rejected">❌ مرفوض</span>`;
  return `<span class="badge-pending">⏳ معلق</span>`;
}

async function loadDefects() {
  const { data, error } = await client
    .from('defects')
    .select('*')
    .order('created_at', { ascending: false });
  if (error) {
    document.getElementById('defectsTbody').innerHTML = `<tr><td colspan="10" class="loading">❌ فشل التحميل</td></tr>`;
    return;
  }
  allDefects = data || [];
  renderDefects(allDefects);
}

function renderDefects(data) {
  const tbody = document.getElementById('defectsTbody');
  if (!data || data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="10" class="no-data">📭 لا توجد عيوب مسجلة</td></tr>`;
    return;
  }
  let html = '';
  data.forEach((d, i) => {
    html += `<tr>
      <td>${i+1}</td>
      <td>${new Date(d.created_at).toLocaleDateString('ar-EG')}</td>
      <td>${d.serial_number || '-'}</td>
      <td>${getStageName(d.stage_id)}</td>
      <td>${d.defect_type || '-'}</td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${d.description || '-'}</td>
      <td>${d.technician_email ? d.technician_email.split('@')[0] : '-'}</td>
      <td>${statusBadge(d.status)}</td>
      <td>${d.action_taken || '-'}</td>
      <td>
        ${d.status === 'pending' ? `
          <button class="btn-action approve" data-id="${d.id}">✅ موافقة</button>
          <button class="btn-action reject" data-id="${d.id}">❌ رفض</button>
        ` : `<span style="color:#64748b;font-size:11px;">تم المعالجة</span>`}
      </td>
    </tr>`;
  });
  tbody.innerHTML = html;
  
  document.querySelectorAll('.btn-action.approve').forEach(btn => {
    btn.addEventListener('click', () => openActionModal(btn.dataset.id, 'approve'));
  });
  document.querySelectorAll('.btn-action.reject').forEach(btn => {
    btn.addEventListener('click', () => openActionModal(btn.dataset.id, 'reject'));
  });
}

function openActionModal(defectId, action) {
  const defect = allDefects.find(d => d.id === defectId);
  if (!defect) return;
  currentDefectId = defectId;
  document.getElementById('actionTitle').textContent = action === 'approve' ? '✅ موافقة على العيب' : '❌ رفض العيب';
  document.getElementById('actionSerial').value = defect.serial_number || '-';
  document.getElementById('actionType').value = defect.defect_type || '-';
  document.getElementById('actionDescription').value = defect.description || '-';
  document.getElementById('actionTaken').value = '';
  document.getElementById('actionApprove').dataset.action = action;
  document.getElementById('actionModal').classList.add('open');
}

document.getElementById('actionCancel').addEventListener('click', () => {
  document.getElementById('actionModal').classList.remove('open');
});

document.getElementById('actionApprove').addEventListener('click', async function() {
  const action = this.dataset.action;
  const actionTaken = document.getElementById('actionTaken').value.trim();
  if (!actionTaken) {
    alert('⚠️ يجب كتابة الإجراء المتخذ قبل الموافقة أو الرفض');
    return;
  }
  
  const status = action === 'approve' ? 'approved' : 'rejected';
  const { error } = await client
    .from('defects')
    .update({
      status: status,
      action_taken: actionTaken,
      approved_by: (await client.auth.getUser()).data.user.id,
      approved_at: new Date().toISOString()
    })
    .eq('id', currentDefectId);
  
  if (error) {
    alert('❌ فشل تحديث الحالة: ' + error.message);
    return;
  }
  
  document.getElementById('actionModal').classList.remove('open');
  loadDefects();
  alert('✅ تم تحديث حالة العيب بنجاح');
});

document.getElementById('actionReject').addEventListener('click', function() {
  document.getElementById('actionApprove').dataset.action = 'reject';
  document.getElementById('actionApprove').click();
});

document.getElementById('applyFilter').addEventListener('click', () => {
  const stageId = document.getElementById('filterStage').value;
  const status = document.getElementById('filterStatus').value;
  const serial = document.getElementById('filterSerial').value.trim().toLowerCase();
  
  let filtered = allDefects;
  if (stageId) filtered = filtered.filter(d => d.stage_id === stageId);
  if (status) filtered = filtered.filter(d => d.status === status);
  if (serial) filtered = filtered.filter(d => d.serial_number && d.serial_number.toLowerCase().includes(serial));
  renderDefects(filtered);
});

document.getElementById('resetFilter').addEventListener('click', () => {
  document.getElementById('filterStage').value = '';
  document.getElementById('filterStatus').value = '';
  document.getElementById('filterSerial').value = '';
  renderDefects(allDefects);
});
</script>
</body>
</html>
