<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تسجيل العيوب - الفني</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { background: #0f172a; padding: 20px; color: #f1f5f9; }
.container { max-width: 1200px; margin: 0 auto; }
.header { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 14px 20px; border-radius: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.header span { color: #94a3b8; }
.header .logout-btn { background: #ef4444; color: white; border: none; padding: 8px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
.header .logout-btn:hover { background: #dc2626; }
.header .nav-link { color: #93c5fd; text-decoration: none; background: #334155; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; }
.header .nav-link:hover { background: #475569; }
.header .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

.view { background: #1e293b; border-radius: 16px; padding: 30px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); margin-bottom: 20px; }
.view h1 { text-align: center; color: #60a5fa; margin-bottom: 24px; font-size: 24px; }
.back-btn { background: #64748b; color: white; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; margin-bottom: 16px; font-weight: bold; }
.back-btn:hover { background: #475569; }

.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
.card { background: #334155; padding: 24px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; }
.card:hover { background: #3d4c66; transform: translateY(-3px); }
.card .icon { font-size: 36px; margin-bottom: 8px; }
.card .name { font-weight: bold; font-size: 16px; color: #f1f5f9; }
.card .sub { color: #94a3b8; font-size: 12px; margin-top: 4px; }
.empty-note { color: #64748b; text-align: center; padding: 40px; font-size: 15px; grid-column: 1/-1; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { background: #334155; padding: 10px 14px; border-radius: 10px; display: flex; flex-direction: column; }
.form-group label { font-size: 12px; color: #94a3b8; margin-bottom: 4px; font-weight: 600; }
.form-group input, .form-group select, .form-group textarea { padding: 8px 12px; border: none; border-radius: 6px; background: #1e293b; color: #f1f5f9; font-size: 14px; }
.form-group input:focus, .form-group select:focus { outline: 2px solid #3b82f6; }
.form-group textarea { min-height: 80px; resize: vertical; }
.btn-submit { grid-column: 1 / -1; padding: 14px; background: #22c55e; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
.btn-submit:hover { background: #16a34a; }
.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-scan { background: #8b5cf6; color: white; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; margin-right: 8px; }
.btn-scan:hover { background: #7c3aed; }
.btn-danger { background: #ef4444; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
.btn-danger:hover { background: #dc2626; }
.btn-success { background: #22c55e; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
.btn-success:hover { background: #16a34a; }
.btn-primary { background: #3b82f6; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
.btn-primary:hover { background: #2563eb; }

.msg { padding: 12px; border-radius: 8px; text-align: center; margin-top: 16px; display: none; font-weight: bold; }
.msg-success { background: #22c55e; color: white; }
.msg-error { background: #ef4444; color: white; }

.scanner-container { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; flex-direction: column; }
.scanner-container.open { display: flex; }
.scanner-container video { max-width: 100%; max-height: 80vh; border-radius: 12px; }
.scanner-container .close-scanner { background: #ef4444; color: white; border: none; padding: 12px 30px; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 16px; }
.scanner-container .close-scanner:hover { background: #dc2626; }

.search-box { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; background: #0f172a; padding: 12px; border-radius: 10px; }
.search-box input { flex: 1; padding: 10px; border: none; border-radius: 6px; background: #334155; color: #f1f5f9; min-width: 200px; }
.search-box button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
.search-box select { padding: 10px; border: none; border-radius: 6px; background: #334155; color: #f1f5f9; }

.table-wrapper { overflow-x: auto; background: #0f172a; border-radius: 10px; padding: 10px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 800px; }
th { background: #334155; color: #94a3b8; padding: 10px 8px; text-align: center; border-bottom: 2px solid #475569; }
td { padding: 8px; text-align: center; border-bottom: 1px solid #334155; color: #e2e8f0; }
tr:hover td { background: #2d3a4f; }
.badge { padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
.badge-pending { background: #f59e0b; color: white; }
.badge-approved { background: #22c55e; color: white; }
.badge-rejected { background: #ef4444; color: white; }

.actions-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
</style>
</head>
<body>
<div class="container">
<div class="header">
<span>👤 <span id="userEmail">فني</span></span>
<div class="header-actions">
<a href="technician.html" class="nav-link">📋 تسجيل قراءات</a>
<button class="logout-btn" id="logoutBtn">تسجيل خروج</button>
</div>
</div>

<!-- الشاشة الرئيسية -->
<div class="view" id="mainView">
<h1>🔧 إدارة العيوب</h1>
<div class="cards-grid">
  <div class="card" id="defectCard">
    <div class="icon">⚠️</div>
    <div class="name">تسجيل عيب جديد</div>
    <div class="sub">سجل عيب في منتج معين</div>
  </div>
  <div class="card" id="searchDefectsCard">
    <div class="icon">🔍</div>
    <div class="name">البحث في العيوب</div>
    <div class="sub">ابحث بالسيريال أو المرحلة</div>
  </div>
</div>
</div>

<!-- شاشة اختيار المرحلة لتسجيل العيوب -->
<div class="view" id="stageSelectView" style="display:none;">
<button class="back-btn" id="backToMain">⬅ رجوع</button>
<h1>🏭 اختر المرحلة</h1>
<div class="cards-grid" id="defectStages"><div class="empty-note">⏳ جاري التحميل...</div></div>
</div>

<!-- شاشة تسجيل العيب -->
<div class="view" id="defectFormView" style="display:none;">
<button class="back-btn" id="backToStages">⬅ رجوع للمراحل</button>
<h1 id="defectFormTitle">⚠️ تسجيل عيب</h1>
<form id="defectForm">
<div class="form-grid">
  <div class="form-group" style="grid-column:1/2;">
    <label>🏷️ السيريال <button type="button" class="btn-scan" id="scanSerialBtn">📷 سكان</button></label>
    <input type="text" id="defectSerial" placeholder="امسح الباركود أو اكتب السيريال" required />
  </div>
  <div class="form-group" style="grid-column:2/3;">
    <label>⚠️ نوع العيب</label>
    <select id="defectType" required>
      <option value="">اختر نوع العيب...</option>
    </select>
  </div>
  <div class="form-group" style="grid-column:1/3;">
    <label>📝 وصف العيب (اختياري)</label>
    <textarea id="defectDescription" placeholder="تفاصيل إضافية عن العيب..."></textarea>
  </div>
</div>
<button type="submit" class="btn-submit" id="defectSubmitBtn">✅ تسجيل العيب</button>
</form>
<div id="defectMsg" class="msg"></div>
</div>

<!-- شاشة البحث في العيوب -->
<div class="view" id="searchView" style="display:none;">
<button class="back-btn" id="backToMainSearch">⬅ رجوع</button>
<h1>🔍 البحث في العيوب</h1>

<div class="search-box">
  <input type="text" id="searchSerialInput" placeholder="🔍 ابحث بالسيريال...">
  <button class="btn-scan" id="scanSearchBtn">📷 سكان</button>
  <select id="searchStageFilter">
    <option value="">كل المراحل</option>
  </select>
  <button class="btn-primary" id="searchBtn">بحث</button>
  <button class="btn-success" id="exportExcelBtn">📥 استخراج Excel</button>
</div>

<div class="actions-bar">
  <button class="btn-danger" id="deleteSelectedBtn">🗑 حذف المحدد</button>
  <button class="btn-danger" id="deleteAllBtn">🗑 حذف الكل</button>
</div>

<div class="table-wrapper">
<table>
<thead>
  <tr>
    <th><input type="checkbox" id="selectAllCheckbox"></th>
    <th>#</th>
    <th>التاريخ</th>
    <th>السيريال</th>
    <th>المرحلة</th>
    <th>نوع العيب</th>
    <th>الوصف</th>
    <th>الحالة</th>
  </tr>
</thead>
<tbody id="defectsTableBody">
  <tr><td colspan="8" class="empty-note">⏳ جاري التحميل...</td></tr>
</tbody>
</table>
</div>
</div>

<!-- ماسح الباركود -->
<div class="scanner-container" id="scannerContainer">
  <video id="scannerVideo"></video>
  <button class="close-scanner" id="closeScanner">✖ إلغاء</button>
</div>

</div>

<script>
const SUPABASE_URL = "https://bqjlqqaabiumcexqchqc.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_D6-VvfjFbWgngyTwkkqrfA_pfoDS-1W";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let selectedStage = null;
let allDefects = [];
let selectedDefects = new Set();
let currentScannerTarget = 'defect';

async function checkAuth() {
  const { data: { user } } = await client.auth.getUser();
  if (!user) { window.location.href = 'index.html'; return; }
  currentUser = user;
  document.getElementById('userEmail').textContent = user.email;
  loadDefectStagesDropdown();
}
checkAuth();

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await client.auth.signOut();
  window.location.href = 'index.html';
});

function showView(view) {
  document.getElementById('mainView').style.display = view === 'main' ? 'block' : 'none';
  document.getElementById('stageSelectView').style.display = view === 'stageSelect' ? 'block' : 'none';
  document.getElementById('defectFormView').style.display = view === 'defectForm' ? 'block' : 'none';
  document.getElementById('searchView').style.display = view === 'search' ? 'block' : 'none';
}

// ============ تسجيل العيوب ============
document.getElementById('defectCard').addEventListener('click', () => {
  showView('stageSelect');
  loadDefectStages();
});

document.getElementById('backToMain').addEventListener('click', () => showView('main'));
document.getElementById('backToStages').addEventListener('click', () => showView('stageSelect'));

async function loadDefectStages() {
  const el = document.getElementById('defectStages');
  const { data, error } = await client.from('stages').select('*').order('created_at');
  if (error || !data || data.length === 0) {
    el.innerHTML = `<div class="empty-note">📭 لا توجد مراحل متاحة</div>`;
    return;
  }
  el.innerHTML = '';
  data.forEach(s => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `<div class="icon">🏭</div><div class="name">${s.name}</div><div class="sub">${s.line_no || ''}</div>`;
    div.addEventListener('click', () => {
      selectedStage = s;
      document.getElementById('defectFormTitle').textContent = `⚠️ تسجيل عيب - ${s.name}`;
      showView('defectForm');
      loadDefectTypes(s.id);
    });
    el.appendChild(div);
  });
}

async function loadDefectTypes(stageId) {
  const select = document.getElementById('defectType');
  select.innerHTML = '<option value="">اختر نوع العيب...</option>';
  
  const { data, error } = await client.from('stage_defects').select('defect_name').eq('stage_id', stageId).order('created_at');
  const types = (!error && data) ? data.map(d => d.defect_name) : [];
  
  if (types.length === 0) {
    const fallbackTypes = ['مقاس غير مطابق', 'جودة سطح', 'عيوب تجميع', 'عيوب مادة', 'أخرى'];
    fallbackTypes.forEach(t => {
      const o = document.createElement('option');
      o.value = t;
      o.textContent = t;
      select.appendChild(o);
    });
  } else {
    types.forEach(t => {
      const o = document.createElement('option');
      o.value = t;
      o.textContent = t;
      select.appendChild(o);
    });
  }
}

// ============ ماسح الباركود ============
function startScanner(target) {
  currentScannerTarget = target;
  document.getElementById('scannerContainer').classList.add('open');
  const video = document.getElementById('scannerVideo');
  
  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
      .then(stream => {
        video.srcObject = stream;
        video.play();
        Quagga.init({
          inputStream: {
            name: "Live",
            type: "LiveStream",
            target: video
          },
          decoder: {
            readers: ["code_128_reader", "ean_reader", "ean_8_reader", "code_39_reader", "code_93_reader", "upc_reader"]
          }
        }, (err) => {
          if (err) {
            console.error(err);
            alert('❌ فشل تشغيل الماسح');
            return;
          }
          Quagga.start();
        });
        
        Quagga.onDetected((result) => {
          const code = result.codeResult.code;
          if (code) {
            stopScanner();
            document.getElementById('scannerContainer').classList.remove('open');
            
            if (currentScannerTarget === 'defect') {
              document.getElementById('defectSerial').value = code;
            } else if (currentScannerTarget === 'search') {
              document.getElementById('searchSerialInput').value = code;
              searchDefects();
            }
          }
        });
      })
      .catch(err => {
        alert('❌ تعذر الوصول إلى الكاميرا: ' + err.message);
        document.getElementById('scannerContainer').classList.remove('open');
      });
  }
}

function stopScanner() {
  Quagga.stop();
  const video = document.getElementById('scannerVideo');
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
    video.srcObject = null;
  }
}

document.getElementById('scanSerialBtn').addEventListener('click', () => startScanner('defect'));
document.getElementById('scanSearchBtn').addEventListener('click', () => startScanner('search'));
document.getElementById('closeScanner').addEventListener('click', () => {
  stopScanner();
  document.getElementById('scannerContainer').classList.remove('open');
});

// ============ تسجيل العيب ============
document.getElementById('defectForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('defectSubmitBtn');
  const msg = document.getElementById('defectMsg');
  btn.disabled = true;
  btn.textContent = '⏳ جاري التسجيل...';
  msg.style.display = 'none';
  
  const serial = document.getElementById('defectSerial').value.trim();
  const defectType = document.getElementById('defectType').value;
  const description = document.getElementById('defectDescription').value.trim();
  
  if (!serial) {
    msg.textContent = '⚠️ يرجى إدخال السيريال';
    msg.className = 'msg msg-error';
    msg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '✅ تسجيل العيب';
    return;
  }
  if (!defectType) {
    msg.textContent = '⚠️ يرجى اختيار نوع العيب';
    msg.className = 'msg msg-error';
    msg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '✅ تسجيل العيب';
    return;
  }
  
  try {
    const { data, error } = await client.from('defects').insert([{
      serial_number: serial,
      stage_id: selectedStage.id,
      form_id: null,
      technician_id: currentUser.id,
      technician_email: currentUser.email,
      defect_type: defectType,
      description: description || null,
      status: 'pending'
    }]);
    
    if (error) throw error;
    
    msg.textContent = '✅ تم تسجيل العيب بنجاح! سيتم مراجعته من قبل الأدمن.';
    msg.className = 'msg msg-success';
    msg.style.display = 'block';
    document.getElementById('defectSerial').value = '';
    document.getElementById('defectDescription').value = '';
    document.getElementById('defectType').value = '';
    
    loadAllDefects();
  } catch (err) {
    msg.textContent = '❌ فشل التسجيل: ' + err.message;
    msg.className = 'msg msg-error';
    msg.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '✅ تسجيل العيب';
  }
});

// ============ البحث في العيوب ============
document.getElementById('searchDefectsCard').addEventListener('click', () => {
  showView('search');
  loadAllDefects();
});

document.getElementById('backToMainSearch').addEventListener('click', () => showView('main'));

async function loadDefectStagesDropdown() {
  const select = document.getElementById('searchStageFilter');
  const { data, error } = await client.from('stages').select('*').order('name');
  if (!error && data) {
    data.forEach(s => {
      const o = document.createElement('option');
      o.value = s.id;
      o.textContent = s.name;
      select.appendChild(o);
    });
  }
}

async function loadAllDefects() {
  const { data, error } = await client.from('defects')
    .select('*')
    .order('created_at', { ascending: false });
  
  if (error) {
    console.error('Error loading defects:', error);
    return;
  }
  allDefects = data || [];
  renderDefects(allDefects);
}

function renderDefects(defects) {
  const tbody = document.getElementById('defectsTableBody');
  if (!defects || defects.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8" class="empty-note">📭 لا توجد عيوب مسجلة</td></tr>`;
    return;
  }
  
  let html = '';
  defects.forEach((d, i) => {
    const statusClass = d.status === 'pending' ? 'badge-pending' : d.status === 'approved' ? 'badge-approved' : 'badge-rejected';
    const statusText = d.status === 'pending' ? '⏳ معلق' : d.status === 'approved' ? '✅ معتمد' : '❌ مرفوض';
    
    html += `<tr>
      <td><input type="checkbox" class="defect-checkbox" data-id="${d.id}"></td>
      <td>${i + 1}</td>
      <td>${new Date(d.created_at).toLocaleDateString('ar-EG')}</td>
      <td>${d.serial_number || '-'}</td>
      <td>${d.stage_id || '-'}</td>
      <td>${d.defect_type || '-'}</td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${d.description || '-'}</td>
      <td><span class="badge ${statusClass}">${statusText}</span></td>
    </tr>`;
  });
  tbody.innerHTML = html;
  
  document.querySelectorAll('.defect-checkbox').forEach(cb => {
    cb.addEventListener('change', (e) => {
      if (e.target.checked) {
        selectedDefects.add(e.target.dataset.id);
      } else {
        selectedDefects.delete(e.target.dataset.id);
      }
    });
  });
  
  document.getElementById('selectAllCheckbox').addEventListener('change', (e) => {
    document.querySelectorAll('.defect-checkbox').forEach(cb => {
      cb.checked = e.target.checked;
      if (e.target.checked) {
        selectedDefects.add(cb.dataset.id);
      } else {
        selectedDefects.delete(cb.dataset.id);
      }
    });
  });
}

document.getElementById('searchBtn').addEventListener('click', searchDefects);

function searchDefects() {
  const serial = document.getElementById('searchSerialInput').value.trim().toLowerCase();
  const stageId = document.getElementById('searchStageFilter').value;
  
  let filtered = allDefects;
  
  if (serial) {
    filtered = filtered.filter(d => d.serial_number && d.serial_number.toLowerCase().includes(serial));
  }
  if (stageId) {
    filtered = filtered.filter(d => d.stage_id === stageId);
  }
  
  renderDefects(filtered);
}

// ============ استخراج Excel ============
document.getElementById('exportExcelBtn').addEventListener('click', () => {
  const visibleRows = document.querySelectorAll('#defectsTableBody tr:not(.empty-note)');
  if (visibleRows.length === 0) {
    alert('⚠️ لا توجد بيانات للتصدير');
    return;
  }
  
  const data = [];
  visibleRows.forEach(row => {
    const cells = row.querySelectorAll('td');
    if (cells.length >= 7) {
      data.push({
        date: cells[2].textContent,
        serial: cells[3].textContent,
        stage: cells[4].textContent,
        defect_type: cells[5].textContent,
        description: cells[6].textContent,
        status: cells[7].textContent.trim()
      });
    }
  });
  
  if (data.length === 0) {
    alert('⚠️ لا توجد بيانات للتصدير');
    return;
  }
  
  const headers = ['التاريخ', 'السيريال', 'المرحلة', 'نوع العيب', 'الوصف', 'الحالة'];
  let csv = headers.join(',') + '\n';
  data.forEach(d => {
    csv += `${d.date},${d.serial},${d.stage},${d.defect_type},${d.description},${d.status}\n`;
  });
  
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `العيوب_${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
  URL.revokeObjectURL(link.href);
});

// ============ حذف البيانات ============
document.getElementById('deleteSelectedBtn').addEventListener('click', async () => {
  if (selectedDefects.size === 0) {
    alert('⚠️ اختر العيوب التي تريد حذفها أولاً');
    return;
  }
  
  if (!confirm(`⚠️ هل أنت متأكد من حذف ${selectedDefects.size} عيب/عيوب محددة؟`)) return;
  
  try {
    const ids = Array.from(selectedDefects);
    const { error } = await client.from('defects').delete().in('id', ids);
    if (error) throw error;
    
    alert(`✅ تم حذف ${ids.length} عيب/عيوب بنجاح`);
    selectedDefects.clear();
    loadAllDefects();
  } catch (err) {
    alert('❌ فشل الحذف: ' + err.message);
  }
});

document.getElementById('deleteAllBtn').addEventListener('click', async () => {
  const count = document.querySelectorAll('#defectsTableBody tr:not(.empty-note)').length;
  if (count === 0) {
    alert('⚠️ لا توجد عيوب للحذف');
    return;
  }
  
  if (!confirm(`⚠️ هل أنت متأكد من حذف كل العيوب (${count} عيب)؟ هذا الإجراء لا يمكن التراجع عنه!`)) return;
  
  try {
    const { error } = await client.from('defects').delete().neq('id', '00000000-0000-0000-0000-000000000000');
    if (error) throw error;
    
    alert(`✅ تم حذف ${count} عيب/عيوب بنجاح`);
    selectedDefects.clear();
    loadAllDefects();
  } catch (err) {
    alert('❌ فشل الحذف: ' + err.message);
  }
});

loadAllDefects();
</script>
</body>
</html>
